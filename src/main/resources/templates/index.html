<!DOCTYPE html>
<html>
<head>
    <title>Email Reply Generator</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="container">

    <h2>Email Reply Generator</h2>

    <p>Enter your email:</p>
    <textarea id="emailContent" placeholder="Type your email here..."></textarea>

    <br><br>

    <p>Select tone:</p>
    <select id="tone">
        <option value="">Select</option>
        <option value="formal">Formal</option>
        <option value="informal">Informal</option>
    </select>

    <br><br>

    <button onclick="generateEmail()">Generate Reply</button>

    <h3>Response:</h3>
    <p id="result"></p>

</div>

<script src="/js/script.js" defer></script>

</body>
</html>
